services:
  kantyna:
    image: kantyna:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - kantyna_data:/app/data
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  kantyna_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/kantyna/data
